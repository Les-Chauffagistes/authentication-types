openapi: 3.0.3

info:
  title: Subscription API
  version: 1.0.0

components:
  schemas:
    User:
      type: object
      required:
        - user_id
        - pseudo
      properties:
        user_id:
          type: string
        pseudo:
          type: string
    LNChallenge:
      type: object
      required:
        - lnurl
        - k1
      properties:
        lnurl:
          type: string
        k1:
          type: string
    LNCallbackSuccessPayload:
      type: object
      required:
        - status
        - code
      properties:
        status:
          type: string
        code:
          type: string
    ExchangeCodePayload:
      type: object
      required:
        - status
      properties:
        status:
          type: enum
          enum:
            - onboarding
            - logged_in
        session_token:
          type: string
        user:
          $ref: '#/components/schemas/User'
        